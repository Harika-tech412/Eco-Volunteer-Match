<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Volunteer Match</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .navbar {
      width: 100%;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03), 0 1.5px 4px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      padding: 0 32px;
      min-height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar .nav-logo {
      font-size: 1.45rem;
      font-weight: bold;
      color: #228B22;
      letter-spacing: 1.5px;
      margin-right: 32px;
      text-decoration: none;
    }
    .navbar .nav-links {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 18px;
    }
    .navbar .nav-links a {
      text-decoration: none;
      color: #333;
      font-size: 1rem;
      padding: 7px 18px;
      border-radius: 4px;
      transition: background 0.17s;
    }
    .navbar .nav-links a:hover {
      background: #f2f2f2;
      color: #228B22;
    }
    .navbar .logout-btn {
      margin-left: 24px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.18s;
      box-shadow: 0 1px 2px rgba(229,57,53,0.07);
    }
    .navbar .logout-btn:hover {
      background: #b71c1c;
    }
    @media (max-width: 520px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
        padding: 12px;
      }
      .navbar .nav-logo {
        margin-bottom: 6px;
      }
      .navbar .nav-links {
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }
      .navbar .logout-btn {
        width: 100%;
        margin-left: 0;
        margin-top: 8px;
      }
    }
  </style>
  <nav class="navbar">
    <a href="/" class="nav-logo">Eco Volunteer Match</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/volunteer-match">Volunteer Match</a>
      <button class="logout-btn" onclick="alert('You have been logged out.')">Logout</button>
    </div>
  </nav>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
